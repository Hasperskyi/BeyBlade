name: Build BeyBlade

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Copy to short path
      run: |
        mkdir C:\BeyBlade
        xcopy . C:\BeyBlade /E /I /Y
      shell: cmd

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21
        cache: maven

    - name: Build Maven project
      run: mvn -B clean package
      working-directory: C:\BeyBlade

    - name: Create minimal JavaFX EXE
      shell: cmd
      run: |
        jpackage ^
          --name BeyBlade ^
          --input C:\BeyBlade\target ^
          --main-jar BeyBlade-1.0-SNAPSHOT.jar ^
          --main-class com.windows.Main ^
          --type exe ^
          --dest C:\BeyBlade\target ^
          --compress 2 ^
          --strip-native-commands ^
          --add-modules java.base,javafx.controls,javafx.fxml,javafx.media

    - name: Zip EXE
      shell: powershell
      run: |
        Compress-Archive -Path C:\BeyBlade\target\BeyBlade\* -DestinationPath C:\BeyBlade\target\BeyBlade-windows.zip -Force

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: BeyBlade-windows
        path: C:\BeyBlade\target\BeyBlade-windows.zip
